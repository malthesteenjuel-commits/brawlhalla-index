<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brawldle!</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* The Main Container for rows and headers */
        .brawldle-grid {
            display: grid;
            /* This ensures exactly 8 columns that shrink to fit the screen */
            grid-template-columns: repeat(8, minmax(0, 1fr)); 
            gap: 5px; /* Reduced gap to save horizontal space */
            margin-top: 10px;
            text-align: center;
            align-items: center;
            width: 100%;
            max-width: 900px; /* Limits the width so it doesn't stretch too far on big monitors */
            margin-left: auto;
            margin-right: auto;
        }

        /* Updated Box Styling */
        .guess-box {
            aspect-ratio: 1/1; 
            border-radius: 4px;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
    
            /* NEW: Fluid font and smaller padding to keep things inside the box */
            font-size: clamp(0.6rem, 1.5vw, 0.9rem); 
            padding: 2px;
            overflow: hidden; /* Prevents text from pushing the box wider */
            word-break: break-word; /* Allows long words like "Strength" to wrap if needed */
    
            border: 1px solid rgba(255,255,255,0.1); /* Subtle border */
            box-sizing: border-box;
        }

        /* Style the headers specifically so they align with the boxes */
        .header-label {
            font-size: 0.75rem;
            font-weight: bold;
            color: #bbb;
            text-transform: uppercase;
            padding-bottom: 5px;
            height: 30px; /* Fixed height for headers */
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        /* Wordle Colors */
        .correct { background-color: #538d4e; } /* Green */
        .partial { background-color: #b59f3b; } /* Yellow (for weapons) */
        .wrong { background-color: #3a3a3c; }   /* Gray */
        /* Add these to your existing <style> tag */
        .guess-box {
            aspect-ratio: 1/1; /* Keep them square */
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);            
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }    

        /* The Flip Animation */
        .flip {
            transform: rotateX(180deg);
        }

        .legend-icon {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Fills the square without stretching */
            display: block;
        }

        /* Victory Modal */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: #1a1a1a;
            padding: 30px;
            border: 2px solid var(--gold);
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
        }
        /* 1. The Main Container */
        .search-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            max-width: 600px; /* Adjust this to make the whole bar wider or thinner */
            margin: 30px auto;
            width: 95%;
        }

        /* 2. The Wrapper around Input + Dropdown */
        .search-container > div:first-child {
            flex: 3; /* This tells the input to take up 3x more space than the button */
            position: relative;
        }

        /* 3. The Input Field itself */
        #brawldle-guess {
            width: 100% !important; /* Force it to fill the wrapper */
            padding: 12px;
            background: #1a1a1a;
            border: 2px solid #444;
            color: white;
            border-radius: 8px;
            font-size: 1.1em;
            box-sizing: border-box; /* Crucial: includes padding in the width calculation */
        }

        /* 4. The Submit Button */
        .search-container .btn-add-tag {
            flex: 1; /* This tells the button to take up the remaining 1 part of space */
            width: auto !important; /* Overrides any "width: 100%" from other styles */
            height: 48px; /* Matches the input height */
            padding: 0 20px;
            margin: 0;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap; /* Keeps the text on one line */
        }

        #brawldle-guess:focus {
            border-color: #ffca28; /* Gold focus color */
        }

        /* The actual dropdown menu */
        .dropdown-content {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #2a2a2a;
            border: 1px solid #444;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 100;
            display: none; /* Hidden until user types */
        }

        /* Individual legend rows in the list */
        .dropdown-item {
            padding: 10px 15px;
            cursor: pointer;
            color: #eee;
            text-align: left;
            transition: background 0.2s;
            border-bottom: 1px solid #333;
        }

        .dropdown-item:hover {
            background: #444;
                color: #ffca28;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Brawldle</h1>
        <div style="text-align: center; margin-bottom: 20px;">
            <a href="index.html" class="btn-add-tag" style="text-decoration: none; padding: 10px 20px; display: inline-block;">
                Back to Index
            </a>
        </div>
        <div class="search-container">
            <div style="position: relative; flex-grow: 1;">
                <input type="text" id="brawldle-guess" placeholder="Guess a legend..." autocomplete="off">
                <div id="custom-dropdown" class="dropdown-content"></div>
            </div>
            <button onclick="makeGuess()" class="btn-add-tag">Submit</button>
        </div>

        <div class="brawldle-grid">
            <div class="header-label">Legend</div>
            <div class="header-label">Gender</div>
            <div class="header-label">Weapon 1</div>
            <div class="header-label">Weapon 2</div>
            <div class="header-label">Stat</div>
            <div class="header-label">Origin</div>
            <div class="header-label">Hobby</div>
            <div class="header-label">Year</div>
        </div>

        <div id="guess-container"></div>
    </div>

    <script src="script.js"></script> 
    <script src="brawldle.js"></script>
    <div id="modal-overlay">
    <div class="modal-content">
        <h2 id="modal-title"></h2>
        <p id="modal-info"></p>
        <button onclick="copyResults()" class="btn-add-tag">Share Result 📋</button>
        <button onclick="location.reload()" class="btn-add-tag" style="background:#444;">Play Random</button>
    </div>
</div>
</body>
</html>
